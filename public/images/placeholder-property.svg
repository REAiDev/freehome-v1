<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#F3F4F6"/>

  <!-- Simple house icon (centered, light and subtle) -->
  <g transform="translate(400, 250)">
    <!-- Roof -->
    <path d="M -60 0 L 0 -45 L 60 0 Z" fill="#D1D5DB" opacity="0.6"/>

    <!-- House body -->
    <rect x="-45" y="0" width="90" height="60" fill="#E5E7EB" opacity="0.6"/>

    <!-- Door -->
    <rect x="-15" y="25" width="30" height="35" fill="#D1D5DB" opacity="0.6"/>

    <!-- Window left -->
    <rect x="-35" y="15" width="18" height="18" fill="#D1D5DB" opacity="0.6"/>

    <!-- Window right -->
    <rect x="17" y="15" width="18" height="18" fill="#D1D5DB" opacity="0.6"/>
  </g>

  <!-- Text below -->
  <text x="400" y="400" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="500" fill="#9CA3AF" text-anchor="middle">
    Image Not Available
  </text>
  <text x="400" y="425" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#D1D5DB" text-anchor="middle">
    Property image could not be loaded
  </text>
</svg>
